apiVersion: v1
kind: Namespace
metadata:
  name: otel-collector
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: opentelemetry
  namespace: flux-system
spec:
  interval: 1h
  url: https://open-telemetry.github.io/opentelemetry-helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-collector
  namespace: otel-collector
spec:
  interval: 1h
  releaseName: otel-collector
  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.108.0"
      sourceRef:
        kind: HelmRepository
        name: opentelemetry
        namespace: flux-system
  install:
    createNamespace: true
  values:
    mode: deployment
    image:
      repository: otel/opentelemetry-collector-contrib
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      processors:
        batch: {}
        memory_limiter:
          limit_mib: 400
      exporters:
        otlp/phoenix:
          endpoint: phoenix.phoenix.svc.cluster.local:6006
          tls:
            insecure: true
        debug:
          verbosity: detailed
      service:
        pipelines:
          traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [otlp/phoenix, debug]
          metrics:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [debug]
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: otel-collector
  namespace: otel-collector
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: otel-collector
  to:
  - group: ""
    kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: otel-collector
  namespace: otel-collector
spec:
  parentRefs:
  - name: agentgateway-external
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /otel
    backendRefs:
    - name: otel-collector-opentelemetry-collector
      namespace: otel-collector
      port: 4318
